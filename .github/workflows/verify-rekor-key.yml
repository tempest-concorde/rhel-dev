name: Verify Rekor public key
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: read-all

jobs:
  verify-rekor-key:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Harden runner
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Verify Rekor public key matches upstream
      run: |
        curl -sL https://rekor.sigstore.dev/api/v1/log/publicKey -o /tmp/rekor-live.pub
        diff containers-policy/rekor.pub /tmp/rekor-live.pub \
          || (echo "ERROR: containers-policy/rekor.pub does not match the live Rekor public key" && exit 1)
