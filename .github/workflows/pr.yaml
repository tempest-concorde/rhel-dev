name: Build bootc container based on pr to latest

on:
  pull_request:
    branches:
      - main

permissions: read-all

env:
  REGISTRY_USER: rh-ee-chbutler
  IMAGE_REGISTRY: quay.io
  IMAGE: rhel-dev

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    container:
      image: registry.access.redhat.com/ubi9/ubi@sha256:b8923f58ef6aebe2b8f543f8f6c5af15c6f9aeeef34ba332f33bf7610012de0c  # ubi9
      options: --privileged
    permissions:
      contents: read
      packages: read
    steps:
    - name: Prepare platform pair
      run: |
        platform=${{ matrix.platform }}
        echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

    - name: Get container tools in UBI builder
      run: dnf -y install podman buildah skopeo make wget git

    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Access a subscription via activation key
      env:
        SMDEV_CONTAINER_OFF: 1
        orgid: ${{ secrets.RHT_ORGID }}
        activation_key: ${{ secrets.RHT_ACT_KEY }}
      run: subscription-manager register --org=$orgid --activationkey=$activation_key

    - name: Workaround open podman-login action issue
      env:
        auth: "{ \"auths\": {} }"
      run: |
        mkdir -p $HOME/.docker
        echo $auth > $HOME/.docker/config.json

    - name: Log in to registry.redhat.io
      uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1
      with:
        username: ${{ secrets.RH_REGISTRY_USER }}
        password: ${{ secrets.RH_REGISTRY_PASSWORD }}
        registry: registry.redhat.io
        auth_file_path: /run/containers/0/auth.json

    - name: Pull deps
      run: make get-deps

    - name: Build Image
      id: build-image
      env:
        IMA_PRIVATE_KEY: ${{ secrets.IMA_PRIVATE_KEY }}
      run: |
        printf '%s' "$IMA_PRIVATE_KEY" > /tmp/ima-private.pem
        buildah build \
          --cap-add SYS_ADMIN \
          --tag ${{ env.IMAGE_REGISTRY }}/${{ env.REGISTRY_USER }}/${{ env.IMAGE }}:${{ env.PLATFORM_PAIR }}-${{ github.sha }} \
          --secret id=ima_private_key,src=/tmp/ima-private.pem \
          -f ./Containerfile .

    - name: Clean up IMA signing key
      if: always()
      run: rm -f /tmp/ima-private.pem

    - name: Validate image
      run: |
        buildah inspect ${{ env.IMAGE_REGISTRY }}/${{ env.REGISTRY_USER }}/${{ env.IMAGE }}:${{ env.PLATFORM_PAIR }}-${{ github.sha }}

    - name: Clean up the subscription
      if: always()
      env:
        SMDEV_CONTAINER_OFF: 1
      run: subscription-manager unregister
